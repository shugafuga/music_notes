<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Notes Learning</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header>
      <h1>🎵 Music Notes Learning</h1>
    </header>

    <div id="toolbar">

      <!-- Labels -->
      <fieldset class="group">
        <legend>Labels</legend>
        <label><input type="radio" name="notation" id="rb-solfege" checked /> Do Re Mi… (Solfège)</label>
        <label><input type="radio" name="notation" id="rb-letters" /> C D E… (Letters)</label>
        <span class="sep"></span>
        <span class="sub-label">Position:</span>
        <label><input type="radio" name="label-pos" id="rb-below" checked /> Below Staff</label>
        <label><input type="radio" name="label-pos" id="rb-near"  /> Near Note</label>
      </fieldset>

      <!-- Ledger lines -->
      <fieldset class="group">
        <legend>Extra Ledger Lines</legend>
        <label><input type="checkbox" id="cb-ledger" /> Show</label>
        <span class="sub-label">Count:</span>
        <input type="number" id="sb-ledger" value="2" min="1" max="6" title="Groups above &amp; below each staff" />
        <span class="hint">(above &amp; below)</span>
      </fieldset>

      <!-- Quiz -->
      <fieldset class="group">
        <legend>Quiz</legend>
        <label><input type="checkbox" id="cb-quiz" /> Random</label>
        <button id="btn-shuffle" title="Re-shuffle note order">🔀 Shuffle</button>
      </fieldset>

      <!-- Piano -->
      <fieldset class="group">
        <legend>Piano</legend>
        <label><input type="checkbox" id="cb-piano" /> Show</label>
        <label><input type="checkbox" id="cb-piano-overlap" /> Overlap</label>
        <label><input type="checkbox" id="cb-piano-col" /> Colored</label>
        <span class="sub-label">Opacity:</span>
        <input type="range" id="sl-opacity" min="0" max="100" value="100" />
      </fieldset>

      <!-- Sheet -->
      <fieldset class="group">
        <legend>Sheet</legend>
        <span class="sub-label">Bg:</span>
        <input type="color" id="cp-sheet-bg" value="#ffffff" title="Sheet background color" />
        <span class="sub-label">Margin:</span>
        <input type="number" id="sb-margin" value="40" min="0" max="200" title="Sheet inner margin (px)" />
        <span class="sep"></span>
        <span class="sub-label">Scale:</span>
        <input type="range" id="sl-scale" min="50" max="300" value="100" step="10" title="Scale (resolution)" />
        <span id="scale-label" class="zoom-label">100%</span>
      </fieldset>

      <!-- Export -->
      <fieldset class="group">
        <legend>Export</legend>
        <span class="sub-label">DPI:</span>
        <input type="number" id="sb-dpi" value="150" min="72" max="600" step="25" title="Export resolution in dots per inch" />
        <span id="export-size" class="export-size">— × — px</span>
        <button id="btn-export" title="Download as PNG">💾 Save PNG</button>
      </fieldset>

    </div><!-- #toolbar -->

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
    </div>

  </div><!-- #app -->

  <script src="app.js"></script>
</body>
</html>
